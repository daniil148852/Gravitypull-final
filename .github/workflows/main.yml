name: Build Minecraft Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # для 1.18+ (если старый мод — скажи, поменяю)

      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 🛠 Build mod
        run: ./gradlew build

      - name: 📦 Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod
          path: build/libs/*.jar
